<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Fond de caisse</title>

<!-- Installation sur l'ecran d'accueil (PWA) -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1f6b4a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fond de caisse" />
<link rel="apple-touch-icon" href="icon-192.png" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --accent: #1f6b4a;
    --bg: #e7e6e1;
    --screen: #f5f5f1;
    --surface: #ffffff;
    --ink: #1b1c19;
    --muted: #797b73;
    --faint: #abaca4;
    --line: #e7e7e1;
    --line-strong: #dcdcd4;
    --under: #b4453a;   /* manquant */
    --over: #b9821f;    /* surplus */
    --shadow: 0 1px 2px rgba(30,32,28,.05), 0 8px 28px rgba(30,32,28,.07);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  /* ---- shell ------------------------------------------------------ */
  .app {
    width: 100%;
    max-width: 432px;
    min-height: 100vh;
    background: var(--screen);
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 0 16px calc(96px + env(safe-area-inset-bottom));
  }
  @media (min-width: 480px) {
    body { padding: 28px 0; align-items: flex-start; }
    .app {
      min-height: auto;
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
      padding-bottom: 104px;
    }
  }

  /* ---- top bar ---------------------------------------------------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 2px 2px;
  }
  .brandline { display: flex; align-items: center; gap: 9px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .brand { font-size: 17px; font-weight: 650; letter-spacing: -.01em; }
  .histbtn {
    appearance: none; border: 1px solid var(--line-strong); background: var(--surface);
    color: var(--ink); font: inherit; font-size: 13px; font-weight: 550;
    padding: 7px 13px; border-radius: 999px; cursor: pointer; display: flex; align-items: center; gap: 7px;
    transition: background .15s, border-color .15s;
  }
  .histbtn:hover { border-color: var(--faint); }
  .histbtn em { font-style: normal; background: var(--accent); color: #fff; font-size: 11px; font-weight: 650;
    min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; }
  .dateline { margin: 5px 2px 16px; color: var(--muted); font-size: 13px; text-transform: capitalize; }

  /* ---- barre de r\u00e9glages en haut ---------------------------------- */
  .toolbar { display: flex; gap: 14px; margin: -4px 2px 16px; }
  .tb-group { display: flex; flex-direction: column; gap: 5px; }
  .tb-lbl { font-size: 10px; font-weight: 650; letter-spacing: .05em; text-transform: uppercase; color: var(--faint); padding-left: 2px; }
  .seg.sm button { padding: 6px 12px; font-size: 12.5px; }

  /* ---- summary ---------------------------------------------------- */
  .summary {
    position: sticky; top: 10px; z-index: 5;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 17px 18px 16px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .sumtop { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; }
  .sumlabel { display: block; font-size: 11.5px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--faint); margin-bottom: 4px; }
  .sumtotal { display: block; font-size: 34px; font-weight: 680; letter-spacing: -.02em; line-height: 1; font-variant-numeric: tabular-nums; }
  .targetbox { text-align: right; }
  .sumtarget { display: block; font-size: 16px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; }

  .bar { position: relative; height: 7px; border-radius: 999px; background: #edece6; margin: 16px 0 13px; overflow: hidden; }
  .barfill { position: absolute; inset: 0 auto 0 0; background: var(--accent); border-radius: 999px; transition: width .35s cubic-bezier(.4,0,.2,1); }
  .summary.over .barfill { background: var(--over); }
  .barmark { display: none; }

  .sumbottom { display: flex; align-items: center; justify-content: space-between; }
  .ecart { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
  .ecart strong { font-weight: 700; font-variant-numeric: tabular-nums; }
  .ecartdot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
  .ecart.ok   { color: var(--accent); } .ecart.ok .ecartdot { background: var(--accent); }
  .ecart.under{ color: var(--under); }  .ecart.under .ecartdot { background: var(--under); }
  .ecart.over { color: var(--over); }   .ecart.over .ecartdot { background: var(--over); }
  .metacount { font-size: 12.5px; color: var(--faint); font-variant-numeric: tabular-nums; }

  /* ---- cards ------------------------------------------------------ */
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; margin-bottom: 16px; overflow: hidden; }
  .cardhead { display: flex; align-items: baseline; justify-content: space-between; padding: 14px 16px 10px; }
  .cardhead h2 { margin: 0; font-size: 13px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); }
  .cardsub { font-size: 14px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .rows { display: flex; flex-direction: column; }

  /* ---- row -------------------------------------------------------- */
  .row {
    display: grid;
    grid-template-columns: 58px 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 9px 16px;
    border-top: 1px solid var(--line);
  }
  [data-density="compacte"] .row { padding: 6px 16px; }

  .chip {
    height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 680; font-variant-numeric: tabular-nums; letter-spacing: -.01em;
    border: 1px solid var(--line-strong); background: #faf9f5;
  }
  .chip-coin { width: 40px; height: 40px; border-radius: 50%; margin: 0 auto; font-size: 12.5px; }
  .chip-bill { width: 56px; height: 34px; border-radius: 7px; }
  /* tints — sobres */
  .tint-blue   { background: #eaf0f7; border-color: #cdddee; color: #2b5277; }
  .tint-red    { background: #f8edec; border-color: #ecd2cf; color: #92413a; }
  .tint-grey   { background: #f0f0ec; border-color: #dcdcd3; color: #5a5c54; }
  .tint-gold   { background: #f7f0dd; border-color: #e6d6ad; color: #846a25; }
  .tint-copper { background: #f4e8df; border-color: #e2c8b4; color: #8a5a3c; }

  .qtyzone { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .stepgroup { display: flex; align-items: center; gap: 8px; }
  .stepgroup-amt { gap: 4px; }
  .stepgroup-amt .amtfield { gap: 2px; }
  .stepgroup-amt .amtinput { width: 52px; font-size: 14px; padding-right: 5px; }
  .stepgroup-amt .step { width: 30px; flex: 0 0 30px; height: 34px; font-size: 17px; }
  .stepgroup-amt .cur { font-size: 12px; }
  .step {
    appearance: none; width: 34px; height: 34px; flex: 0 0 34px; border-radius: 9px;
    border: 1px solid var(--line-strong); background: var(--surface); color: var(--ink);
    font-size: 19px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .12s, border-color .12s, transform .05s;
  }
  .step:hover { border-color: var(--faint); background: #faf9f5; }
  .step:active { transform: scale(.94); }
  .step:disabled { opacity: .35; cursor: default; }
  .qty {
    width: 46px; height: 34px; text-align: center; border: 1px solid var(--line-strong); border-radius: 9px;
    background: var(--surface); color: var(--ink); font: inherit; font-size: 16px; font-weight: 600;
    font-variant-numeric: tabular-nums; appearance: textfield; -moz-appearance: textfield; -webkit-appearance: textfield;
  }
  .qty-wide { width: 72px; font-size: 17px; }
  .qty:focus, .amtinput:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent); }
  .qty::-webkit-outer-spin-button, .qty::-webkit-inner-spin-button,
  .amtinput::-webkit-outer-spin-button, .amtinput::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .montant { justify-self: end; min-width: 78px; text-align: right; }
  .amtshow { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .amtshow.zero { color: var(--faint); font-weight: 500; }
  .amtfield { display: inline-flex; align-items: center; gap: 4px; }
  .amtinput {
    width: 76px; height: 34px; text-align: right; border: 1px solid var(--line-strong); border-radius: 9px;
    background: var(--surface); color: var(--ink); font: inherit; font-size: 15px; font-weight: 600;
    font-variant-numeric: tabular-nums; padding-right: 7px; appearance: textfield; -moz-appearance: textfield; -webkit-appearance: textfield;
  }
  .cur { color: var(--muted); font-size: 14px; }
  .keptval { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .keptval.zero { color: var(--faint); font-weight: 500; }

  /* ---- colonne en-tête + retrait (pièces) ------------------------- */
  .colhead { display: grid; grid-template-columns: 58px 1fr auto; gap: 12px; padding: 2px 16px 8px; }
  .colhead.r4 { grid-template-columns: 44px minmax(0,1fr) 54px 76px; }
  .colhead span { font-size: 10px; font-weight: 650; letter-spacing: .05em; text-transform: uppercase; color: var(--faint); }
  .colhead .c-rem { text-align: center; } .colhead .c-kept { text-align: right; }
  .row.r4 { grid-template-columns: 44px minmax(0,1fr) 54px 76px; }
  .row.r4 .chip-coin { margin: 0; }
  .remzone { display: flex; justify-content: center; }
  .rem {
    width: 48px; height: 34px; text-align: center; border: 1px solid var(--line-strong); border-radius: 9px;
    background: #faf9f5; color: var(--ink); font: inherit; font-size: 15px; font-weight: 600;
    font-variant-numeric: tabular-nums; appearance: textfield; -moz-appearance: textfield; -webkit-appearance: textfield;
  }
  .rem::-webkit-outer-spin-button, .rem::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .rem:focus { outline: none; border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent); }
  .rem::placeholder { color: var(--faint); }

  /* ---- bloc arrondi ---------------------------------------------- */
  .arrondi { border-top: 1px solid var(--line); padding: 13px 16px 15px; display: flex; flex-direction: column; gap: 11px; background: #fcfcfa; }
  .arr-line { display: flex; align-items: center; justify-content: space-between; }
  .arr-line .lbl { font-size: 13px; font-weight: 600; color: var(--muted); }
  .seg { display: inline-flex; background: #edece6; border-radius: 9px; padding: 2px; gap: 2px; }
  .seg button { appearance: none; border: none; background: none; font: inherit; font-size: 13px; font-weight: 600; color: var(--muted); padding: 6px 14px; border-radius: 7px; cursor: pointer; transition: background .12s; }
  .seg button.on { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }
  .arr-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 9px 10px; min-height: 54px; }
  .stat label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); font-weight: 650; margin-bottom: 4px; }
  .stat b { font-size: 15px; font-weight: 680; font-variant-numeric: tabular-nums; }
  .stat b.rm { color: var(--under); } .stat b.ok { color: var(--accent); }
  .stat .cible { display: block; font-size: 10.5px; color: var(--muted); font-weight: 500; margin-top: 1px; }
  .arr-foot { display: flex; align-items: center; gap: 12px; }
  .suggestbtn { appearance: none; border: 1px solid var(--line-strong); background: var(--surface); color: var(--ink); font: inherit; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 10px; cursor: pointer; transition: border-color .12s; }
  .suggestbtn:hover { border-color: var(--faint); } .suggestbtn:disabled { opacity: .45; cursor: default; }
  .arr-note { font-size: 12px; color: var(--over); font-weight: 550; }
  .arr-ok { font-size: 12.5px; color: var(--accent); font-weight: 650; }

  /* ---- carte répartition billets --------------------------------- */
  .plan { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; margin-bottom: 16px; padding: 15px 16px; }
  .plan-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .plan-head h2 { margin: 0; font-size: 13px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); }
  .plan-head span { font-size: 12px; color: var(--faint); }
  .plan-suggest { appearance: none; border: 1px solid var(--line-strong); background: var(--surface); color: var(--ink); font: inherit; font-size: 12px; font-weight: 600; padding: 6px 11px; border-radius: 9px; cursor: pointer; transition: border-color .12s, opacity .12s; }
  .plan-suggest:hover { border-color: var(--faint); } .plan-suggest:disabled { opacity: .4; cursor: default; }
  .plan-hint { margin: 0 0 12px; font-size: 12px; color: var(--muted); }
  .plan-ok { margin: 8px 0 0; font-size: 12.5px; color: var(--accent); font-weight: 650; }
  .plan-lines { display: flex; flex-direction: column; gap: 9px; margin-bottom: 11px; }
  .plan-line { display: grid; grid-template-columns: 50px 1fr auto; align-items: center; gap: 10px; font-size: 14px; }
  .pchip { height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 7px; font-size: 12.5px; font-weight: 680; font-variant-numeric: tabular-nums; border: 1px solid var(--line-strong); }
  .pchip.tint-blue { background: #eaf0f7; border-color: #cdddee; color: #2b5277; }
  .pchip.tint-red { background: #f8edec; border-color: #ecd2cf; color: #92413a; }
  .pchip.tint-grey { background: #f0f0ec; border-color: #dcdcd3; color: #5a5c54; }
  .pchip.ghostchip { background: transparent; border-style: dashed; border-color: var(--line-strong); color: var(--faint); font-size: 11px; font-weight: 600; }
  .pstep { display: flex; align-items: center; gap: 7px; justify-self: start; }
  .plan-line .desc { color: var(--faint); }
  .plan-line .val { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--muted); justify-self: end; }
  .plan-line.muted .desc { color: var(--faint); }
  .plan-total { display: flex; justify-content: space-between; border-top: 1px solid var(--line); padding-top: 10px; font-size: 15px; font-weight: 680; font-variant-numeric: tabular-nums; }
  .plan-total .ok { color: var(--accent); }
  .plan-warn { margin: 8px 0 0; font-size: 12px; color: var(--over); font-weight: 550; }
  .plan-foot { display: flex; align-items: center; gap: 12px; margin-top: 13px; flex-wrap: wrap; }
  .plan-thresh { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); }
  .plan-thresh input { width: 60px; height: 32px; border: 1px solid var(--line-strong); border-radius: 8px; text-align: right; padding-right: 6px; font: inherit; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; appearance: textfield; -moz-appearance: textfield; -webkit-appearance: textfield; }
  .plan-thresh input::-webkit-outer-spin-button, .plan-thresh input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .applybtn { margin-left: auto; appearance: none; border: none; background: var(--accent); color: #fff; font: inherit; font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 10px; cursor: pointer; transition: filter .15s; }
  .applybtn:hover { filter: brightness(1.06); } .applybtn:disabled { opacity: .45; cursor: default; }

  .footnote { text-align: center; color: var(--faint); font-size: 11.5px; margin: 4px 0 8px; }

  /* ---- encart Quart ----------------------------------------------- */
  .shift { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; margin-bottom: 16px; padding: 14px 16px 15px; }
  .shift .cardhead { padding: 0 0 12px; }
  .shift-slots { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .slot { border: 1px solid var(--line); border-radius: 13px; padding: 11px 12px; background: #fcfcfa; display: flex; flex-direction: column; gap: 2px; min-height: 78px; }
  .slot.filled { background: var(--surface); border-color: var(--line-strong); }
  .slot-lbl { font-size: 11px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; color: var(--faint); margin-bottom: 3px; }
  .slot-total { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .slot-date { font-size: 11.5px; color: var(--muted); }
  .slot-empty { font-size: 13px; color: var(--faint); font-weight: 500; margin-top: 2px; }
  .slot-emp { font-size: 11.5px; color: var(--under); font-weight: 600; margin-top: 3px; }
  .slot-more { align-self: flex-start; margin-top: 4px; appearance: none; background: none; border: none; font: inherit; font-size: 11.5px; font-weight: 600; color: var(--accent); cursor: pointer; padding: 0; }
  .shift-diff { display: flex; align-items: center; justify-content: space-between; margin-top: 11px; padding-top: 11px; border-top: 1px solid var(--line); font-size: 13px; color: var(--muted); }
  .shift-diff strong { font-size: 14px; font-variant-numeric: tabular-nums; color: var(--ink); }
  .shift-diff strong.neg { color: var(--under); } .shift-diff strong.pos { color: var(--accent); }
  .shift-list { list-style: none; margin: 12px 0 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .shift-list li { display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 8px; padding: 8px 10px; background: #fcfcfa; border: 1px solid var(--line); border-radius: 10px; }
  .sl-total { font-size: 14px; font-weight: 680; font-variant-numeric: tabular-nums; }
  .sl-date { font-size: 11.5px; color: var(--muted); }

  /* ---- modale de confirmation ------------------------------------- */
  .modal-wrap { position: fixed; inset: 0; background: rgba(20,22,18,.4); display: flex; align-items: center; justify-content: center; z-index: 80; padding: 24px; animation: fadeIn .18s ease both; }
  .modal { width: 100%; max-width: 340px; background: var(--surface); border-radius: 18px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,.3); }
  .modal h3 { margin: 0 0 10px; font-size: 17px; font-weight: 700; }
  .modal p { margin: 0 0 8px; font-size: 14px; color: var(--muted); line-height: 1.45; }
  .modal p b { color: var(--ink); }
  .modal-q { color: var(--ink) !important; font-weight: 550; }
  .modal-ecart { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 11px 13px; border-radius: 12px; margin-bottom: 14px; font-size: 13px; }
  .modal-ecart span { font-weight: 550; }
  .modal-ecart strong { font-size: 18px; font-variant-numeric: tabular-nums; }
  .modal-ecart.under { background: #f8edec; color: var(--under); }
  .modal-ecart.over { background: #f7f0dd; color: var(--over); }
  .modal-field { display: block; margin-top: 4px; }
  .modal-field span { display: block; font-size: 11px; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; color: var(--faint); margin-bottom: 6px; }
  .modal-field input { width: 100%; height: 44px; border: 1px solid var(--line-strong); border-radius: 11px; background: var(--surface); color: var(--ink); font: inherit; font-size: 16px; font-weight: 550; padding: 0 13px; box-sizing: border-box; }
  .modal-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent); }
  .modal-note { margin-top: 10px !important; font-size: 12px !important; color: var(--muted) !important; }
  .modal-acts { display: flex; gap: 10px; margin-top: 16px; }
  .modal-acts .btn { padding: 12px; border-radius: 12px; }

  /* ---- action bar ------------------------------------------------- */
  .actionbar {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 0;
    width: 100%; max-width: 432px;
    display: flex; gap: 10px;
    padding: 12px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, rgba(245,245,241,0) 0%, var(--screen) 26%);
    z-index: 20;
  }
  @media (min-width: 480px) { .actionbar { position: sticky; transform: none; left: auto; margin-top: auto; border-radius: 0 0 30px 30px; } }
  .btn { flex: 1; appearance: none; border: 1px solid transparent; font: inherit; font-size: 15px; font-weight: 600;
    padding: 13px; border-radius: 13px; cursor: pointer; transition: filter .15s, background .15s, border-color .15s; }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { filter: brightness(1.06); }
  .btn.primary:active { filter: brightness(.95); }
  .btn.secondary { background: var(--surface); color: var(--ink); border-color: var(--line-strong); flex: 0 0 42%; }
  .btn.secondary:hover { border-color: var(--faint); }
  .shift-bar { gap: 8px; }
  .btn.ghostbtn { flex: 0 0 56px; background: var(--surface); color: var(--muted); border-color: var(--line-strong); font-size: 13px; padding: 13px 0; }
  .btn.ghostbtn:hover { border-color: var(--faint); color: var(--ink); }
  .shift-bar .btn.primary { flex: 1; font-size: 14px; padding: 13px 6px; }

  /* ---- toast ------------------------------------------------------ */
  .toast {
    position: fixed; bottom: calc(82px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; font-size: 13.5px; font-weight: 550; padding: 9px 16px; border-radius: 999px;
    z-index: 40; box-shadow: 0 8px 24px rgba(0,0,0,.22); animation: toastIn .25s ease both;
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ---- history sheet --------------------------------------------- */
  .sheet-wrap { position: fixed; inset: 0; background: rgba(20,22,18,.34); opacity: 0; pointer-events: none;
    transition: opacity .25s; z-index: 60; display: flex; align-items: flex-end; justify-content: center; }
  .sheet-wrap.show { opacity: 1; pointer-events: auto; }
  .sheet { width: 100%; max-width: 432px; background: var(--screen); border-radius: 22px 22px 0 0;
    max-height: 82vh; overflow-y: auto; padding: 8px 16px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); box-shadow: 0 -8px 30px rgba(0,0,0,.16); }
  .sheet-wrap.show .sheet { transform: translateY(0); }
  .sheet-grab { width: 40px; height: 4px; border-radius: 999px; background: var(--line-strong); margin: 8px auto 4px; }
  .sheet-head { display: flex; align-items: center; justify-content: space-between; padding: 6px 2px 12px; }
  .sheet-head h2 { margin: 0; font-size: 18px; font-weight: 680; }
  .ghost { appearance: none; background: none; border: none; font: inherit; font-size: 14px; font-weight: 550; color: var(--accent); cursor: pointer; padding: 4px; }
  .ghost.sm { font-size: 13px; }
  .ghost.danger { color: var(--under); }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 28px 0 36px; }
  .histlist { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .histitem { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px;
    display: grid; grid-template-columns: 1fr auto; grid-template-areas: "main diff" "acts acts"; gap: 8px 12px; align-items: center; }
  .histmain { grid-area: main; display: flex; flex-direction: column; gap: 2px; }
  .histkind { font-size: 10.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
  .histkind.start { color: var(--accent); } .histkind.end { color: #2b5277; }
  .histtotal { font-size: 17px; font-weight: 680; font-variant-numeric: tabular-nums; }
  .histdate { font-size: 12px; color: var(--muted); }
  .histdiff { grid-area: diff; font-size: 13.5px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .histdiff.ok { color: var(--accent); } .histdiff.under { color: var(--under); } .histdiff.over { color: var(--over); }
  .histacts { grid-area: acts; display: flex; gap: 6px; justify-content: flex-end; border-top: 1px solid var(--line); padding-top: 8px; }
</style>
